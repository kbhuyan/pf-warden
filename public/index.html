<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pf-warden | Access Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/js/theme.js"></script>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>

<body class="bg-gray-100 text-gray-800 font-sans antialiased min-h-screen">

    <!-- LOGIN VIEW -->
    <div id="login-view" class="hidden-view min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm">
            <h1 class="text-2xl font-bold text-center text-brand-900 mb-6">pf-warden</h1>
            <div id="login-error" class="hidden bg-red-100 text-red-700 p-2 rounded mb-4 text-sm text-center"></div>
            <form id="login-form">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="username"
                        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-brand-500"
                        required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password"
                        class="w-full px-3 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-brand-500"
                        required>
                </div>
                <button type="submit"
                    class="w-full bg-brand-600 text-white font-bold py-2 px-4 rounded hover:bg-brand-500 transition">Log
                    In</button>
            </form>
        </div>
    </div>

    <!-- DASHBOARD VIEW -->
    <div id="dashboard-view" class="hidden-view">
        <!-- Navbar -->
        <nav class="bg-brand-900 text-white shadow-md">
            <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
                <h1 class="text-xl font-bold tracking-wide">pf-warden</h1>
                <button onclick="logout()"
                    class="text-sm bg-brand-600 hover:bg-brand-500 px-3 py-1 rounded transition">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-6xl mx-auto px-4 py-6 sm:py-8">

            <!-- Add Device Form -->
            <div
                class="bg-white p-4 sm:p-6 rounded-lg shadow-sm border border-gray-200 mb-6 sm:mb-8 flex flex-col sm:flex-row items-stretch sm:items-end gap-3 sm:gap-4">
                <div class="flex-grow">
                    <label class="block text-sm font-medium text-gray-700 mb-1 sm:mb-2">Create New Device
                        Profile</label>
                    <input type="text" id="new-device-name" placeholder="e.g., Kids AppleTV"
                        class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-brand-500 transition">
                </div>
                <button onclick="createDevice()"
                    class="w-full sm:w-auto bg-green-600 text-white font-bold py-2 px-6 rounded-md hover:bg-green-500 transition whitespace-nowrap shadow-sm">
                    Add Device
                </button>
            </div>

            <!-- Tag Control Center -->
            <div id="tag-controls-container" class="mb-8 hidden">
                <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-3">Group Controls (Tags)</h3>
                <div id="tag-controls" class="flex flex-wrap gap-4">
                    <!-- JS will inject tag master toggles here -->
                </div>
            </div>

            <!-- Devices Grid -->
            <div id="devices-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
                <!-- JavaScript will inject device cards here -->
            </div>

        </main>
    </div>

    <script src="/js/app.js"></script>
</body>

</html>
